<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>我的评分记录</title>
    <style>
        :root {
            --bg0: #e9eef8;
            --bg1: #f4f2fb;
            --card: #ffffff;
            --text: #1c2333;
            --muted: #5c6578;
            --border: rgba(28, 35, 51, 0.08);
            --accent: #4f6ae6;
            --accent-soft: rgba(79, 106, 230, 0.12);
            --accent-hover: #3d56c9;
            --danger: #e85d6a;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 24px rgba(28, 35, 51, 0.08);
            --shadow-sm: 0 2px 12px rgba(28, 35, 51, 0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            min-height: 100vh;
            padding: 24px 18px 40px;
            color: var(--text);
            background: linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 45%, #eef1f9 100%);
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 920px; margin: 0 auto; }
        .nav-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 18px;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 2px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }
        .nav-home:hover { color: var(--accent-hover); background: var(--accent-soft); }
        .header {
            background: var(--card);
            padding: 26px 28px;
            border-radius: var(--radius-lg);
            margin-bottom: 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 4px 0 0 4px;
            background: linear-gradient(180deg, #5b7cfa, #7c5fd4);
        }
        .header h1 { font-size: 1.55rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--text); }
        .header .sub { font-size: 14px; color: var(--muted); line-height: 1.55; max-width: 52em; }
        .tabs-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 6px;
            background: rgba(255,255,255,0.65);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .tab {
            flex: 1 1 auto;
            min-width: 140px;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .tab:hover { background: rgba(79, 106, 230, 0.08); color: var(--text); }
        .tab.active {
            background: linear-gradient(135deg, #5b7cfa 0%, #6b5fd8 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 106, 230, 0.35);
        }
        .card {
            background: var(--card);
            padding: 22px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .card h2 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: 16px;
            color: var(--muted);
            text-transform: none;
        }
        .table-wrap {
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
            background: #fafbfd;
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        tbody tr { background: #fff; transition: background 0.15s; }
        tbody tr:hover { background: #f6f8ff; }
        tbody tr:last-child td { border-bottom: none; }
        th {
            background: linear-gradient(180deg, #f8f9fc 0%, #f0f2f8 100%);
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
        }
        .btn-sm {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            margin-right: 8px;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            transition: transform 0.12s, box-shadow 0.2s, background 0.2s;
        }
        .btn-sm:active { transform: scale(0.98); }
        .btn-view {
            background: linear-gradient(135deg, #5b7cfa, #5e6ae8);
            color: #fff;
            box-shadow: 0 2px 8px rgba(79, 106, 230, 0.25);
        }
        .btn-view:hover { filter: brightness(1.05); }
        .btn-del { background: #eceef3; color: #4a5160; }
        .btn-del:hover { background: var(--danger); color: #fff; }
        .state-panel {
            text-align: center;
            padding: 36px 20px;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
        }
        .state-panel .state-icon { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.85; }
        .state-panel.state-error {
            background: linear-gradient(180deg, #fff5f5 0%, #fff 100%);
            border: 1px solid rgba(232, 93, 106, 0.25);
            border-radius: var(--radius-md);
            color: #8a3d45;
        }
        .state-panel.state-error .state-icon { filter: grayscale(0.2); }
        .state-panel.state-empty { padding: 40px 24px; }
        .state-panel.state-loading { color: var(--muted); }
        .viewer-modal { display: none; position: fixed; inset: 0; background: rgba(20, 24, 35, 0.55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .viewer-modal.show { display: flex; }
        .viewer-box {
            background: var(--card);
            border-radius: var(--radius-lg);
            width: 92%;
            max-width: 860px;
            min-width: min(520px, 100%);
            max-height: 88vh;
            overflow: auto;
            padding: 22px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.18);
            border: 1px solid var(--border);
        }
        .viewer-box .close { float: right; cursor: pointer; font-size: 22px; color: var(--muted); line-height: 1; transition: color 0.2s; }
        .viewer-box .close:hover { color: var(--text); }
        .viewer-content { margin-top: 12px; clear: both; }
        #viewerIframe { width: 100%; height: 72vh; max-height: 640px; border: none; display: block; border-radius: 8px; }
        .student-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin-left: 8px; }
        .suggestion-card { margin-top: 4px; }
        .suggestion-card h2 { margin-bottom: 14px; font-size: 1rem; color: var(--text); }
        .msg-list {
            max-height: min(320px, 45vh);
            overflow-y: auto;
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 14px;
            background: linear-gradient(180deg, #f6f7fb 0%, #f0f2f8 100%);
            border: 1px solid var(--border);
            scrollbar-width: thin;
        }
        .msg-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            align-items: flex-end;
        }
        .msg-row:last-child { margin-bottom: 0; }
        .msg-row.trainer { flex-direction: row; }
        .msg-row.student { flex-direction: row-reverse; }
        .msg-avatar {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .msg-row.trainer .msg-avatar { background: linear-gradient(135deg, #4f8ff7, #5b7cfa); }
        .msg-row.student .msg-avatar { background: linear-gradient(135deg, #3dbb8c, #2ea574); }
        .msg-bubble {
            max-width: calc(100% - 48px);
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.55;
            box-shadow: var(--shadow-sm);
        }
        .msg-row.trainer .msg-bubble {
            background: #fff;
            border: 1px solid rgba(79, 106, 230, 0.15);
            border-bottom-left-radius: 4px;
        }
        .msg-row.student .msg-bubble {
            background: #e8faf2;
            border: 1px solid rgba(46, 165, 116, 0.2);
            border-bottom-right-radius: 4px;
            text-align: left;
        }
        .msg-bubble .meta { font-size: 11px; color: var(--muted); margin-top: 8px; font-weight: 500; }
        .msg-bubble img.msg-img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            margin-top: 4px;
            display: block;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .msg-bubble img.msg-img:hover { opacity: 0.95; }
        .suggestion-form { display: flex; flex-direction: column; gap: 12px; }
        .suggestion-form .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: stretch; }
        .suggestion-form textarea {
            flex: 1;
            min-width: 200px;
            min-height: 80px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            background: #fafbfd;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .suggestion-form textarea:focus {
            outline: none;
            border-color: rgba(79, 106, 230, 0.45);
            box-shadow: 0 0 0 3px var(--accent-soft);
            background: #fff;
        }
        .suggestion-form .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .suggestion-form button {
            padding: 11px 22px;
            background: linear-gradient(135deg, #5b7cfa, #6b5fd8);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(79, 106, 230, 0.3);
            transition: transform 0.12s, filter 0.2s;
        }
        .suggestion-form button:hover { filter: brightness(1.06); }
        .suggestion-form button:active { transform: scale(0.98); }
        .suggestion-form .btn-img { background: #5a6268; }
        .suggestion-form .img-zone {
            border: 2px dashed rgba(79, 106, 230, 0.35);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            background: rgba(255,255,255,0.7);
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
        }
        .suggestion-form .img-zone:hover, .suggestion-form .img-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--text);
        }
        .suggestion-form .img-preview { max-width: 140px; max-height: 110px; border-radius: 8px; margin-top: 8px; display: block; margin-left: auto; margin-right: auto; box-shadow: var(--shadow-sm); }
        .img-enlarge-modal { display: none; position: fixed; inset: 0; background: rgba(12, 14, 22, 0.88); z-index: 1100; align-items: center; justify-content: center; padding: 20px; cursor: pointer; backdrop-filter: blur(6px); }
        .img-enlarge-modal.show { display: flex; }
        .img-enlarge-modal img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 10px; pointer-events: none; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .img-enlarge-modal .close-hint { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; opacity: 0.9; }
        .empty-inline { color: var(--muted); font-size: 14px; line-height: 1.6; padding: 8px 4px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="nav-home">← 返回首页</a>
        <div class="header">
            <h1 id="pageTitle">我的评分记录</h1>
            <p class="sub" id="pageSub">按环节查看抻面、下面及捞面、成品检测后的评分历史，可查看或删除记录。</p>
        </div>
        <div class="tabs-bar">
            <button type="button" class="tab active" data-stage="stretch">抻面评分记录</button>
            <button type="button" class="tab" data-stage="boiling">下面及捞面评分记录</button>
            <button type="button" class="tab" data-stage="product">成品评分记录</button>
        </div>
        <div class="card">
            <h2 id="sectionTitle">抻面评分记录</h2>
            <div id="listWrap">
                <div class="table-wrap" id="tableWrap" style="display:none;">
                    <table id="recordTable">
                        <thead><tr><th>时间</th><th>名称/文件</th><th>操作</th></tr></thead>
                        <tbody id="recordBody"></tbody>
                    </table>
                </div>
                <div id="listEmpty" class="state-panel state-loading"><span class="state-icon" aria-hidden="true">⏳</span>加载中…</div>
            </div>
        </div>
        <div class="card suggestion-card" id="suggestionCard" style="display:none;">
            <h2 id="suggestionTitle">培训师建议与回复</h2>
            <div id="suggestionThread" class="msg-list">加载中…</div>
            <div id="suggestionFormWrap" style="display:none;">
                <div class="suggestion-form" id="suggestionForm">
                    <div class="form-row">
                        <textarea id="suggestionInput" placeholder="输入建议内容（培训师）或回复内容（学员）…"></textarea>
                        <div class="btn-row">
                            <button type="button" id="suggestionSendBtn">发送</button>
                        </div>
                    </div>
                    <div id="suggestionImageZone" class="img-zone" style="display:none;">点击或拖拽图片到此处上传 · 可从本地文件夹选择</div>
                    <input type="file" id="suggestionImageInput" accept="image/*" style="display:none;" />
                    <div id="suggestionImagePreviewWrap" style="display:none;"><img id="suggestionImagePreview" class="img-preview" alt="预览" /><span id="suggestionImageName"></span> <button type="button" id="suggestionImageClear">移除</button></div>
                </div>
            </div>
        </div>
    </div>
    <div id="viewerModal" class="viewer-modal">
        <div class="viewer-box">
            <span class="close" id="viewerClose">&times;</span>
            <div class="viewer-content" id="viewerContent"></div>
        </div>
    </div>
    <div id="imgEnlargeModal" class="img-enlarge-modal" title="点击任意处关闭">
        <span class="close-hint" id="imgEnlargeClose">&times;</span>
        <img id="imgEnlargeImg" src="" alt="放大" />
    </div>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var studentId = params.get('student_id') ? parseInt(params.get('student_id'), 10) : null;
            var studentName = params.get('student_name') || '';
            var currentStage = 'stretch';
            var currentUserId = null;

            if (studentId && studentName) {
                document.getElementById('pageTitle').textContent = '学员评分记录';
                document.getElementById('pageSub').innerHTML = '学员「' + escapeHtml(studentName) + '」的评分历史，可查看、删除或给予建议。';
            }

            function escapeHtml(s) {
                if (!s) return '';
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function listUrl(stage) {
                var url = '/api/list_saved_score_results?stage=' + encodeURIComponent(stage);
                if (studentId) url += '&student_id=' + studentId;
                return url;
            }

            function setListLoading() {
                var empty = document.getElementById('listEmpty');
                var tableWrap = document.getElementById('tableWrap');
                empty.className = 'state-panel state-loading';
                empty.innerHTML = '<span class="state-icon" aria-hidden="true">⏳</span>加载中…';
                empty.style.display = 'block';
                tableWrap.style.display = 'none';
            }

            function loadList(stage) {
                currentStage = stage;
                var tbody = document.getElementById('recordBody');
                var tableWrap = document.getElementById('tableWrap');
                var empty = document.getElementById('listEmpty');
                tbody.innerHTML = '';
                setListLoading();

                if (stage === 'product') {
                    empty.className = 'state-panel state-empty';
                    empty.innerHTML = '<span class="state-icon" aria-hidden="true">📋</span><p>成品评分记录功能即将开放，请先在「兰州拉面成品综合评分」中上传并评分。</p>';
                    empty.style.display = 'block';
                    tableWrap.style.display = 'none';
                    return;
                }

                fetch(listUrl(stage), { credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.success) {
                            empty.className = 'state-panel state-error';
                            empty.innerHTML = '<span class="state-icon" aria-hidden="true">⚠️</span><p>' + escapeHtml(data.error || '加载失败') + '</p>';
                            empty.style.display = 'block';
                            tableWrap.style.display = 'none';
                            return;
                        }
                        currentUserId = data.user_id;
                        var files = data.files || [];
                        if (files.length === 0) {
                            empty.className = 'state-panel state-empty';
                            empty.innerHTML = '<span class="state-icon" aria-hidden="true">📭</span><p>暂无该环节的评分记录。请先在抻面/下面及捞面检测中完成检测并保存评分。</p>';
                            empty.style.display = 'block';
                            tableWrap.style.display = 'none';
                            return;
                        }
                        empty.style.display = 'none';
                        tableWrap.style.display = 'block';
                        files.forEach(function(f) {
                            var tr = document.createElement('tr');
                            var mtime = f.mtime ? new Date(f.mtime * 1000).toLocaleString('zh-CN') : '';
                            var name = f.filename || '';
                            tr.innerHTML = '<td>' + escapeHtml(mtime) + '</td><td>' + escapeHtml(name) + '</td><td>' +
                                '<button type="button" class="btn-sm btn-view" data-fn="' + escapeHtml(f.filename) + '" data-uid="' + (f.user_id || '') + '">查看</button>' +
                                '<button type="button" class="btn-sm btn-del" data-fn="' + escapeHtml(f.filename) + '" data-uid="' + (f.user_id || '') + '">删除</button></td>';
                            tbody.appendChild(tr);
                        });
                        tbody.querySelectorAll('.btn-view').forEach(function(btn) {
                            btn.onclick = function() { viewRecord(btn.getAttribute('data-fn'), btn.getAttribute('data-uid')); };
                        });
                        tbody.querySelectorAll('.btn-del').forEach(function(btn) {
                            btn.onclick = function() { deleteRecord(btn.getAttribute('data-fn'), btn.getAttribute('data-uid')); };
                        });
                    })
                    .catch(function() {
                        empty.className = 'state-panel state-error';
                        empty.innerHTML = '<span class="state-icon" aria-hidden="true">📡</span><p>网络错误，请稍后重试</p>';
                        empty.style.display = 'block';
                        tableWrap.style.display = 'none';
                    });
            }

            function viewRecord(filename, uid) {
                var url = '/api/saved_score_result_content?stage=' + encodeURIComponent(currentStage) + '&filename=' + encodeURIComponent(filename);
                if (uid) url += '&user_id=' + encodeURIComponent(uid);
                fetch(url, { credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.success) {
                            alert(data.error || '加载失败');
                            return;
                        }
                        var wrap = document.getElementById('viewerContent');
                        wrap.innerHTML = '<iframe id="viewerIframe" style="width:100%;min-height:70vh;border:none;"></iframe>';
                        var iframe = document.getElementById('viewerIframe');
                        iframe.srcdoc = data.content || '';
                        document.getElementById('viewerModal').classList.add('show');
                    })
                    .catch(function() { alert('加载失败'); });
            }

            function deleteRecord(filename, uid) {
                if (!confirm('确定删除该条评分记录？删除后不可恢复。')) return;
                var url = '/api/saved_score_result?stage=' + encodeURIComponent(currentStage) + '&filename=' + encodeURIComponent(filename);
                if (uid) url += '&user_id=' + encodeURIComponent(uid);
                fetch(url, { method: 'DELETE', credentials: 'include' })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success) {
                            loadList(currentStage);
                        } else {
                            alert(data.error || '删除失败');
                        }
                    })
                    .catch(function() { alert('删除失败'); });
            }

            document.getElementById('viewerClose').onclick = function() {
                document.getElementById('viewerModal').classList.remove('show');
            };
            document.getElementById('viewerModal').onclick = function(e) {
                if (e.target.id === 'viewerModal') document.getElementById('viewerModal').classList.remove('show');
            };

            var titles = { stretch: '抻面评分记录', boiling: '下面及捞面评分记录', product: '成品评分记录' };
            document.querySelectorAll('.tab').forEach(function(tab) {
                tab.onclick = function() {
                    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    var stage = tab.getAttribute('data-stage');
                    document.getElementById('sectionTitle').textContent = titles[stage] || stage;
                    loadList(stage);
                };
            });

            loadList('stretch');

            var currentRole = null;
            fetch('/api/auth/session', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.success && d.user) currentRole = d.user.role;
                if (studentId && currentRole === 1) {
                    document.getElementById('suggestionCard').style.display = 'block';
                    document.getElementById('suggestionTitle').textContent = '给予学员建议';
                    document.getElementById('suggestionFormWrap').style.display = 'block';
                    document.getElementById('suggestionInput').placeholder = '输入给学员的建议（可选，可仅发图片）…';
                    document.getElementById('suggestionSendBtn').textContent = '发送建议';
                    document.getElementById('suggestionImageZone').style.display = 'block';
                    initTrainerImageUpload();
                    loadSuggestions();
                } else if (!studentId && currentRole === 2) {
                    document.getElementById('suggestionCard').style.display = 'block';
                    document.getElementById('suggestionTitle').textContent = '培训师建议与回复';
                    document.getElementById('suggestionFormWrap').style.display = 'block';
                    document.getElementById('suggestionInput').placeholder = '输入回复内容…';
                    document.getElementById('suggestionSendBtn').textContent = '回复';
                    document.getElementById('suggestionImageZone').style.display = 'none';
                    loadSuggestions();
                }
            });

            var suggestionImageFile = null;
            function initTrainerImageUpload() {
                var zone = document.getElementById('suggestionImageZone');
                var input = document.getElementById('suggestionImageInput');
                var previewWrap = document.getElementById('suggestionImagePreviewWrap');
                var preview = document.getElementById('suggestionImagePreview');
                var nameEl = document.getElementById('suggestionImageName');
                var clearBtn = document.getElementById('suggestionImageClear');
                if (!zone || !input) return;
                zone.onclick = function() { input.click(); };
                input.onchange = function() {
                    var f = input.files && input.files[0];
                    if (!f || !f.type.match(/^image\//)) { suggestionImageFile = null; input.value = ''; previewWrap.style.display = 'none'; return; }
                    suggestionImageFile = f;
                    nameEl.textContent = f.name;
                    var r = new FileReader();
                    r.onload = function() { preview.src = r.result; previewWrap.style.display = 'block'; };
                    r.readAsDataURL(f);
                };
                clearBtn.onclick = function() { suggestionImageFile = null; input.value = ''; previewWrap.style.display = 'none'; preview.src = ''; };
                zone.ondragover = function(e) { e.preventDefault(); zone.classList.add('dragover'); };
                zone.ondragleave = function() { zone.classList.remove('dragover'); };
                zone.ondrop = function(e) {
                    e.preventDefault();
                    zone.classList.remove('dragover');
                    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                    if (!f || !f.type.match(/^image\//)) return;
                    suggestionImageFile = f;
                    input.files = e.dataTransfer.files;
                    nameEl.textContent = f.name;
                    var r = new FileReader();
                    r.onload = function() { preview.src = r.result; previewWrap.style.display = 'block'; };
                    r.readAsDataURL(f);
                };
            }

            function loadSuggestions() {
                var url = '/api/suggestions';
                if (studentId) url += '?student_id=' + studentId;
                fetch(url, { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(d) {
                    var el = document.getElementById('suggestionThread');
                    if (!d.success) {
                        el.innerHTML = '<div class="state-panel state-error"><span class="state-icon" aria-hidden="true">⚠️</span><p>' + escapeHtml(d.error || '加载失败') + '</p></div>';
                        return;
                    }
                    var thread = d.thread || {};
                    var msgs = thread.messages || [];
                    if (msgs.length === 0) {
                        el.innerHTML = '<div class="state-panel state-empty empty-inline"><span class="state-icon" aria-hidden="true">💬</span>暂无消息。' + (studentId ? '在下方输入建议发送给学员，可发送文字或图片。' : '培训师发送建议后您可在此回复。') + '</div>';
                        return;
                    }
                    el.innerHTML = msgs.map(function(m) {
                        var role = m.role === 'trainer' ? '培训师' : '我';
                        var cls = m.role === 'trainer' ? 'trainer' : 'student';
                        var av = m.role === 'trainer' ? '师' : '我';
                        var at = (m.at || '').replace('T', ' ').substring(0, 19);
                        var body = '';
                        if (m.content_type === 'image') {
                            body = '<img class="msg-img" src="/api/suggestions/image/' + escapeHtml(m.content || '') + '" alt="图片" title="点击放大" />';
                        } else {
                            body = escapeHtml(m.content || '');
                        }
                        return '<div class="msg-row ' + cls + '"><div class="msg-avatar" aria-hidden="true">' + av + '</div><div class="msg-bubble">' + body + '<div class="meta">' + role + ' · ' + at + '</div></div></div>';
                    }).join('');
                }).catch(function() {
                    var el = document.getElementById('suggestionThread');
                    el.innerHTML = '<div class="state-panel state-error"><span class="state-icon" aria-hidden="true">📡</span><p>加载失败，请稍后重试</p></div>';
                });
            }

            (function initImgEnlarge() {
                var modal = document.getElementById('imgEnlargeModal');
                var imgEl = document.getElementById('imgEnlargeImg');
                var closeBtn = document.getElementById('imgEnlargeClose');
                var threadEl = document.getElementById('suggestionThread');
                if (!modal || !imgEl || !threadEl) return;
                function showEnlarge(src) {
                    if (!src) return;
                    imgEl.src = src;
                    modal.classList.add('show');
                }
                function hideEnlarge() {
                    modal.classList.remove('show');
                    imgEl.src = '';
                }
                threadEl.addEventListener('click', function(e) {
                    if (e.target && e.target.classList && e.target.classList.contains('msg-img')) {
                        e.preventDefault();
                        showEnlarge(e.target.src);
                    }
                });
                modal.onclick = function(e) { if (e.target === modal) hideEnlarge(); };
                if (closeBtn) closeBtn.onclick = hideEnlarge;
            })();

            document.getElementById('suggestionSendBtn').onclick = function() {
                var text = (document.getElementById('suggestionInput').value || '').trim();
                if (studentId && currentRole === 1) {
                    if (suggestionImageFile) {
                        var fd = new FormData();
                        fd.append('student_id', String(studentId));
                        fd.append('content', text);
                        fd.append('image', suggestionImageFile);
                        fetch('/api/suggestions/upload', { method: 'POST', credentials: 'include', body: fd })
                            .then(function(r) { return r.json(); })
                            .then(function(d) {
                                if (d.success) {
                                    document.getElementById('suggestionInput').value = '';
                                    suggestionImageFile = null;
                                    document.getElementById('suggestionImageInput').value = '';
                                    document.getElementById('suggestionImagePreviewWrap').style.display = 'none';
                                    loadSuggestions();
                                } else alert(d.error || '发送失败');
                            })
                            .catch(function() { alert('发送失败'); });
                        return;
                    }
                    if (!text) { alert('请输入建议内容或选择一张图片'); return; }
                    fetch('/api/suggestions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ student_id: studentId, content: text }) })
                        .then(function(r) { return r.json(); })
                        .then(function(d) {
                            if (d.success) { document.getElementById('suggestionInput').value = ''; loadSuggestions(); } else alert(d.error || '发送失败');
                        })
                        .catch(function() { alert('发送失败'); });
                    return;
                }
                if (!studentId && currentRole === 2) {
                    if (!text) { alert('请输入回复内容'); return; }
                    fetch('/api/suggestions/reply', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ content: text }) })
                        .then(function(r) { return r.json(); })
                        .then(function(d) {
                            if (d.success) { document.getElementById('suggestionInput').value = ''; loadSuggestions(); } else alert(d.error || '发送失败');
                        })
                        .catch(function() { alert('发送失败'); });
                }
            };
        })();
    </script>
</body>
</html>
